<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            /* Application Theme UI colors */
            --ui-bg: #1e1e24;
            --ui-card: #2a2b36;
            --ui-text: #f8f8f2;
            --ui-accent: #3498db;
            --ui-border: #3d3f4d;

            /* Default Typography Variables */
            --base-font-size: 16px;
            --heading-weight: 400;
            --bold-weight: 600;
            --line-height: 1.6;
            
            /* Physical page consistency */
            --preview-margin: 12mm; 
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #fcfcfc;
            color: #333;
        }

        /* Top Application Bar */
        header {
            background-color: var(--ui-bg);
            color: var(--ui-text);
            padding: 12px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: var(--ui-accent);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        /* Control Panel Layout */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            background: var(--ui-card);
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid var(--ui-border);
            font-size: 0.85rem;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            color: #b2b2b2;
            white-space: nowrap;
        }

        .control-group input[type="range"] {
            accent-color: var(--ui-accent);
            width: 90px;
            cursor: pointer;
        }

        .control-value {
            min-width: 45px;
            text-align: right;
            color: var(--ui-text);
            font-family: monospace;
        }

        /* Interactive Buttons */
        .btn {
            background: #3d3f4d;
            color: #fff;
            border: none;
            padding: 7px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #4e5163;
        }

        .btn-primary {
            background: var(--ui-accent);
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        #file-input {
            display: none;
        }

        /* Workspace Setup */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .editor-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #282a36;
            border-right: 1px solid #d0d0d0;
        }

        #markdown-input {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;
            padding: 24px;
            box-sizing: border-box;
            background-color: #282a36;
            color: #f8f8f2;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .preview-side {
            flex: 1;
            background-color: #ffffff;
            overflow-y: auto;
            box-sizing: border-box;
            padding: 40px; 
        }

        /* Cleaned & Balanced Document Typography Rules */
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #2c3e50;
            max-width: 800px;
            margin: 0 auto;
            
            /* Dynamic Controls mapped via CSS custom variables */
            font-size: var(--base-font-size);
            line-height: var(--line-height);
        }

        /* Normalized Headings */
        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3, 
        .markdown-body h4 {
            color: #1a252f;
            font-weight: var(--heading-weight);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.25;
            break-after: avoid; 
        }

        .markdown-body h1 { font-size: 1.85em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.2em; margin-top: 1.3em;}
        .markdown-body h3 { font-size: 1.15em; }

        /* Strip margin-top from the absolute first element to prevent first-page layout displacement */
        .markdown-body > :first-child {
            margin-top: 0 !important;
        }

        .markdown-body strong {
            font-weight: var(--bold-weight);
            color: #111;
        }

        .markdown-body p, 
        .markdown-body ul, 
        .markdown-body ol {
            margin-top: 0;
            margin-bottom: 1em;
        }
		
		.markdown-body a {
			color: #0366d6;
			text-decoration: none;
		}

        .markdown-body li {
            margin-top: 0.25em;
        }

        /* Code & blockquotes decoration rules */
        .markdown-body code {
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            background-color: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 88%;
            color: #e06c75;
        }

        .markdown-body pre {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
        }

        .markdown-body blockquote {
            margin: 1.5em 0;
            padding: 0 1em;
            color: #6a737d;
            border-left: 4px solid #cbd5e1;
            font-style: italic;
        }

        /* Tables layout design */
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5em;
            font-size: 90%;
        }
        .markdown-body table th, 
        .markdown-body table td {
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body table th {
            background-color: #f8fafc;
            font-weight: var(--heading-weight);
        }
        .markdown-body table tr:nth-child(even) {
            background-color: #f8fafc;
        }

        /* =======================================================
           FIXED PRINT SPECIFICATIONS
           ======================================================= */
        @media print {
            @page {
                margin: var(--preview-margin); 
            }
            
            header, .editor-side {
                display: none !important;
            }
            
            body {
                background-color: #fff;
                height: auto;
            }
            
            .workspace {
                display: block;
                overflow: visible;
            }
            
            .preview-side {
                width: 100%;
                overflow: visible;
                background-color: transparent;
                padding: 0 !important; 
                margin: 0 !important;
            }
            
            .markdown-body {
                max-width: 100%;
            }

            /* Prevents items breaking in half across pages layout breaks */
            .markdown-body pre, 
            .markdown-body blockquote, 
            .markdown-body table, 
            .markdown-body tr {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="top-row">
            <div class="logo">md2<span>pdf</span></div>
            <div class="actions">
                <button class="btn" onclick="document.getElementById('file-input').click()">📁 Open Markdown</button>
                <input type="file" id="file-input" accept=".md" onchange="loadMarkdownFile(this)">
                <button class="btn btn-primary" onclick="window.print()">🎉 Export PDF</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-group">
                <label for="input-size">Font Size:</label>
                <input type="range" id="input-size" min="12" max="22" value="16" step="1" oninput="updateStyle('--base-font-size', this.value + 'px', this.id)">
                <div class="control-value" id="val-input-size">16px</div>
            </div>
            <div class="control-group">
                <label for="input-hweight">Heading Boldness:</label>
                <input type="range" id="input-hweight" min="400" max="800" value="400" step="100" oninput="updateStyle('--heading-weight', this.value, this.id)">
                <div class="control-value" id="val-input-hweight">400</div>
            </div>
            <div class="control-group">
                <label for="input-bweight">Text Boldness (Strong):</label>
                <input type="range" id="input-bweight" min="500" max="900" value="600" step="100" oninput="updateStyle('--bold-weight', this.value, this.id)">
                <div class="control-value" id="val-input-bweight">600</div>
            </div>
            <div class="control-group">
                <label for="input-height">Line Spacing:</label>
                <input type="range" id="input-height" min="1.3" max="2.0" value="1.6" step="0.1" oninput="updateStyle('--line-height', this.value, this.id)">
                <div class="control-value" id="val-input-height">1.6</div>
            </div>
            <div class="control-group">
                <label for="input-margin">Page Margin:</label>
                <input type="range" id="input-margin" min="5" max="50" value="12" step="1" oninput="updateStyle('--preview-margin', this.value + 'mm', this.id)">
                <div class="control-value" id="val-input-margin">12mm</div>
            </div>
        </div>
    </header>

    <div class="workspace">
        <div class="editor-side">
            <textarea id="markdown-input" spellcheck="false" placeholder="Write markdown text content..."></textarea>
        </div>
        <div class="preview-side">
            <div id="preview" class="markdown-body"></div>
        </div>
    </div>

    <script>
        const markdownInput = document.getElementById('markdown-input');
        const previewElement = document.getElementById('preview');

        const sampleMarkdown = `# Multi-page Print Layout Verification
This document contains extended baseline body blocks specifically constructed to flow beyond a single physical sheet. Adjust the margin slider to observe how page 2 and page 3 now completely respect bounding alignments.

## Section Header 2
This sub-section showcases typography size steps. The contrast between this text, headers, and bulleted lists below feels naturally balanced to the eye.

* An elegant unordered checklist point.
* Secondary bullet entry containing a code block reference inline \`config.json\`.
* Third line item to verify vertical spacing metrics.

### Technical Elements Specification Table
| Option Standard | Default Layout | Description Context |
| :--- | :---: | :--- |
| Core Parsing Engine | Marked JS | Client-side lightning fast translation |
| Formatting Engine | CSS Variables | Dynamic updates managed in real time |

> "Typography configuration adjustments immediately dictate content reading comfort." - Anonymous Layout Specialist

---

## Simulated Page Break Segment
Below is duplicate content engineered to trip the second page layout processing pipeline context. Notice how headings do not overlap page tops anymore.

### Section Header - Page 2 Focus
Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam nec elementum diam. Proin vestibulum convallis leo in ultrices. Ut porta elit a dolor condimentum varius. Integer ac tincidunt massa. Suspendisse pulvinar erat sit amet metus molestie, rhoncus iaculis lorem facilisis.

* Secondary checklist verification step.
* Continuous inline coding elements text string layout structure assignment rules.
* Bullet framework testing boundary logic constraints inside print engines.

### Additional Structural Metrics
| System Unit | Active Assignment | Scale Target |
| :--- | :---: | :--- |
| Print Margins | @page API | Universal Application |
| Break Avoidance | Applied | Fragment Elimination |

---

## Simulated Page Break Segment 3
This content segment overflows directly into physical sheet 3.

### Section Header - Page 3 Focus
Consectetur adipiscing elit. Aliquam nec elementum diam. Proin vestibulum convallis leo in ultrices. Ut porta elit a dolor condimentum varius. Integer ac tincidunt massa. Suspendisse pulvinar erat sit amet metus molestie, rhoncus iaculis lorem facilisis.

> Important layout milestone: The container padding has been stripped in favor of the systemic native print engine page setup rule.`;

        // Initialize view states
        window.addEventListener('DOMContentLoaded', () => {
            markdownInput.value = sampleMarkdown;
            updatePreview();
        });

        // Watch for source edits
        markdownInput.addEventListener('input', updatePreview);

        function updatePreview() {
            previewElement.innerHTML = marked.parse(markdownInput.value);
        }

        // Live Dynamic CSS custom property update execution 
        function updateStyle(property, value, elementId) {
            document.documentElement.style.setProperty(property, value);
            document.getElementById(`val-${elementId}`).innerText = value;
        }

        // File system entry pipeline 
        function loadMarkdownFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                markdownInput.value = e.target.result;
                updatePreview();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
